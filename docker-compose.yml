services:
  influxdb:
    image: influxdb:2
    container_name: tfl-influxdb
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: thinfilm2026
      DOCKER_INFLUXDB_INIT_ORG: ThinFilmLab
      DOCKER_INFLUXDB_INIT_BUCKET: measurements
      DOCKER_INFLUXDB_INIT_RETENTION: 720h
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: tfl-dev-token-2026
    restart: unless-stopped

volumes:
  influxdb-data:
  influxdb-config:
